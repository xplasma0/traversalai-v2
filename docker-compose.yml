services:
  traversalai-gateway:
    image: ${TRAVERSALAI_IMAGE:-traversalai:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TRAVERSALAI_GATEWAY_TOKEN: ${TRAVERSALAI_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${TRAVERSALAI_CONFIG_DIR}:/home/node/.traversalai
      - ${TRAVERSALAI_WORKSPACE_DIR}:/home/node/.traversalai/workspace
    ports:
      - "${TRAVERSALAI_GATEWAY_PORT:-18789}:18789"
      - "${TRAVERSALAI_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${TRAVERSALAI_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  traversalai-cli:
    image: ${TRAVERSALAI_IMAGE:-traversalai:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TRAVERSALAI_GATEWAY_TOKEN: ${TRAVERSALAI_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${TRAVERSALAI_CONFIG_DIR}:/home/node/.traversalai
      - ${TRAVERSALAI_WORKSPACE_DIR}:/home/node/.traversalai/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
